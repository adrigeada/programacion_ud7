<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trello</title>
    <style>

        .tablero{
            margin-top: 15px;
            display: flex;
            width: 100%;
            height: 700px;
            text-align: center;
        }
        .pendiente{
            border: solid black 1px;
            height: 100%;
            width: 33%;
        }

        .enProceso{
            border: solid black 1px;
            height: 100%;
            width: 33%;
        }

        .finalizado{
            border: solid black 1px;
            height: 100%;
            width: 33%;
        }

        .tarjeta{
            border: solid red 1px;
            margin: 5px;
            width: 60%;
            text-align: start;
            padding: 10px;
            justify-self: center;
        }
    </style>
    <script src="trellojs.js" defer></script>
</head>
<body>

    <h1>Bienvenido al gestor de tareas</h1>

    <form action="">
        <p>Tarea a realizar:</p>
        <textarea name="" id="textoTarea" style="width: 300px; height: 100px;"></textarea><br>
        <select name="" id="opcion">
            <option value="pendiente">PENDIENTE</option>
            <option value="en-proceso">EN PROCESO</option>
            <option value="finalizado">FINALIZADO</option>
        </select>
        <br><br>
        <button id="enviar">Crear</button>
    </form>

    <p id="demo"></p>

    <div class="tablero">
        <div class="pendiente" id="columna1">PENDIENTE</div>
        <div class="enProceso" id="columna2">EN PROCESO</div>
        <div class="finalizado" id="columna3">FINALIZADO</div>
    </div>
    
</body>
</html>
